name: 레퍼런스 모드 전환

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '배포할 버전을 선택하세요'
        required: true
        type: choice
        options:
          - '레퍼런스 ON (성과·사례 포함)'
          - '레퍼런스 OFF (간결 버전)'

jobs:
  switch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 버전 파일 교체
        run: |
          if [[ "${{ inputs.mode }}" == "레퍼런스 ON"* ]]; then
            cp portfolio-full/index.html index.html
            echo "레퍼런스 ON 버전으로 전환"
          else
            cp _src/no-refs.html index.html
            echo "레퍼런스 OFF 버전으로 전환"
          fi

      - name: 커밋 & 배포
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "deploy: ${{ inputs.mode }}"
          git push
